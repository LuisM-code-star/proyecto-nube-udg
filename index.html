<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conceptualización de servicios en la nube</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('https://dynamic-media-cdn.tripadvisor.com/media/photo-o/08/8b/c8/5b/rectoria-de-la-universidad.jpg?w=1200&h=-1&s=1');
            background-size: cover;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }
        /* Contenedor principal */
        .main-container {
            width: 80%;
            margin: 50px auto;
            background-color: rgba(255, 255, 255, 0.9);
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        header {
            background-color: #2c3e50;
            padding: 20px;
            display: flex;
            align-items: center;
        }
        header img {
            height: 60px; /* Ajusta según tu logo */
        }
        .content {
            padding: 40px;
            flex: 1;
            text-align: center;
        }
        footer {
            background-color: #ecf0f1;
            padding: 20px;
            text-align: center;
            font-size: 0.9em;
            border-top: 1px solid #bdc3c7;
        }
        .video-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #e74c3c;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <!-- Logo a la izquierda -->
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQEeP0ZgfgNiQTVAo7XV63o8rxisn_UWIQV-A&s" alt="Logo del sitio">
        </header>

        <div class="content">
            <h1>Bienvenido al Proyecto de Nube</h1>
            <p>Haz clic en el botón de abajo para ver el video solicitado:</p>
            <a href="https://www.youtube.com/watch?v=9Nu9q5Pu_Fo" target="_blank" class="video-link">Ver Video en YouTube</a>
        </div>

        <footer>
            <p><strong>Curso:</strong> Conceptualización de servicios en la nube</p>
            <p><strong>Nombre:</strong> Luis Fernando Moreno López</p>
            <p><strong>Código:</strong> 224065863</p>
            <p><strong>Correo:</strong> luis.moreno24a@udgvirtual.udg.mx</p>
        </footer>
    </div>

</body>
</html>
